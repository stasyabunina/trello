<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>A Simple Trello ToDo List Manager</title>
</head>

<body>
  <main class="list">
    <div class="container">
      <div class="list__wrapper">
        <h1 class="list__title visually-hidden">A Simple Trello ToDo List Manager</h1>
        <div class="top list__top">
          <span class="top__text"></span>
          <div class="top__buttons">
            <button class="top__clear" type="button">Clear all</button>
          </div>
        </div>
        <ul class="columns list__columns">
          <li class="column_to-do column">
            <article class="column__wrapper">
              <h2 class="column__title">Todo</h2>
              <ul class="column__cards">
                <li class="column__card">
                  <p class="column__text">An example card.</p>
                </li>
                <li class="column__card">
                  <p class="column__text">Another example card.</p>
                </li>
              </ul>
              <button class="column__btn" type="button"><span class="plus">+</span><span class="column__btn-text">Add
                  another card</span></button>
            </article>
          </li>
          <li class="column_in-progress column">
            <article class="column__wrapper">
              <h2 class="column__title">In Progress</h2>
              <ul class="column__cards">
                <li class="column__card">
                  <p class="column__text">This is an example card.</p>
                </li>
              </ul>
              <button class="column__btn" type="button"><span class="plus">+</span><span class="column__btn-text">Add
                  another card</span></button>
            </article>
          </li>
          <li class="column_done column">
            <article class="column__wrapper">
              <h2 class="column__title">Done</h2>
              <ul class="column__cards">
                <li class="column__card">
                  <p class="column__text">And this is also an example card.</p>
                </li>
                <li class="column__card">
                  <p class="column__text">Just an example card.</p>
                </li>
                <li class="column__card">
                  <p class="column__text">An example card again.</p>
                </li>
              </ul>
              <button class="column__btn" type="button"><span class="plus">+</span><span class="column__btn-text">Add
                  another card</span></button>
            </article>
          </li>
        </ul>
        <span class="rights">&copy; Все svg-иконки взяты с <a href="https://icons8.com/" class="link"
          target="_blank">icons8.com</a></span>
      </div>
    </div>
  </main>
</body>

</html>
